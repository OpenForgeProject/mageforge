# actions/labeler v5 config.
# Only changed-files, head-branch and base-branch are supported here; head-branch
# values are regexes (not globs). Labeling by PR title is handled by a separate
# step in .github/workflows/label.yml, since the action cannot match titles.

Documentation:
  - changed-files:
      - any-glob-to-any-file: "**/*.md"

Feature:
  - head-branch: ["^(add|feat|feature)[/-]"]

Fix:
  - head-branch: ["^(fix|bugfix)[/-]"]

Next-Release:
  - head-branch: [^release-please]

Command:
  - changed-files:
      - any-glob-to-any-file: src/Console/Command/**

Frontend:
  - changed-files:
      - any-glob-to-any-file: src/view/frontend/**

Theme-Builder:
  - changed-files:
      - any-glob-to-any-file: src/Service/ThemeBuilder/**

CI/CD:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/actions/**"
          - ".trunk/**"

Dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "composer.json"
          - "composer.lock"
          - "package.json"
          - "package-lock.json"
          - "yarn.lock"
          - "pnpm-lock.yaml"

Config:
  - changed-files:
      - any-glob-to-any-file:
          - "src/etc/**"
          - "src/**/etc/**"

Inspector:
  - changed-files:
      - any-glob-to-any-file:
          - "src/view/frontend/web/js/inspector.js"
          - "src/Model/TemplateEngine/Decorator/InspectorHints.php"

Toolbar:
  - changed-files:
      - any-glob-to-any-file:
          - "src/view/frontend/web/js/toolbar/**"
          - "src/view/frontend/web/css/toolbar.css"

I18n:
  - changed-files:
      - any-glob-to-any-file:
          - "src/i18n/*.csv"

Styling:
  - changed-files:
      - any-glob-to-any-file:
          - "src/view/frontend/web/css/**"
          - "**/*.css"
